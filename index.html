<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Carteira FII</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Carteira FII">

<link rel="apple-touch-icon" href="icon-192.png">

<style>
body{
    margin:0;
    background:#0f172a;
    font-family:Arial,sans-serif;
}

.container{
    max-width:500px;
    margin:auto;
    padding:15px;
}

h1{
    color:#fff;
    text-align:center;
    font-size:26px;
}

.card{
    background:#1e293b;
    border-radius:18px;
    padding:16px;
    margin-bottom:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.25);
}

h2{
    color:#fff;
    font-size:18px;
    margin-top:0;
}

input{
    width:100%;
    box-sizing:border-box;
    padding:12px;
    margin-bottom:10px;
    border:none;
    border-radius:12px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    font-size:16px;
    color:#fff;
    background:#16a34a;
    margin-top:6px;
    cursor:pointer;
}

.menu-btn{
    background:#2563eb;
}

.resumo h3{
    color:#fff;
    margin:6px 0;
}

.item{
    background:#334155;
    color:#fff;
    padding:12px;
    border-radius:12px;
    margin-bottom:10px;
}

.btn-excluir{
    background:#dc2626;
}
</style>

</head>
<body>

<div class="container">

<h1>💰 Carteira FII</h1>

<div class="card">

<h2>Novo Aporte</h2>

<input
type="text"
id="fundo"
placeholder="Fundo (MXRF11)">

<input
type="number"
id="cotas"
placeholder="Quantidade de cotas">

<input
type="number"
step="0.01"
id="valor"
placeholder="Valor da cota">

<input
type="date"
id="data">

<button onclick="salvarAporte()">
Salvar Aporte
</button>

</div>

<div class="card">

<h2>Rendimento Mensal</h2>

<input
type="text"
id="fundoRendimento"
placeholder="Fundo">

<input
type="month"
id="mes">

<input
type="number"
step="0.01"
id="rendimento"
placeholder="Valor recebido">

<button onclick="salvarRendimento()">
Salvar Rendimento
</button>

</div>

<div class="card resumo">

<h3 id="totalInvestido">
Investido: R$ 0,00
</h3>

<h3 id="totalRendimentos">
Rendimentos: R$ 0,00
</h3>

</div>

<button
class="menu-btn"
onclick="document.getElementById('fundosCard').scrollIntoView({behavior:'smooth'});">

📂 Abrir Fundos Cadastrados

</button>

<br><br>

<button
class="menu-btn"
onclick="location.href='historico.html'">

📋 Abrir Histórico

</button>

<br><br>

<div class="card">

<h2>💵 Rendimentos Cadastrados</h2>

<div id="listaRendimentos"></div>

</div>

<div
class="card"
id="fundosCard">

<h2>Fundos Cadastrados</h2>

<div id="listaFundos"></div>

<button
class="menu-btn"
onclick="window.scrollTo({top:0,behavior:'smooth'});">

⬆️ Voltar ao Início

</button>

</div>

</div>

<script src="app.js"></script>

<script>

if(typeof carregarListaFundos === 'function'){
    carregarListaFundos();
}

if(typeof carregarListaRendimentos === 'function'){
    carregarListaRendimentos();
}

</script>

</body>
</html>
