<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Carteira FII</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Carteira FII">
<link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
<div class="container">
<h1>💰 Carteira FII</h1>

<div class="card">
<h2>Novo Aporte</h2>
<input type="text" id="fundo" placeholder="Fundo (MXRF11)">
<input type="number" id="cotas" placeholder="Quantidade de cotas">
<input type="number" step="0.01" id="valor" placeholder="Valor da cota">
<input type="date" id="data">
<button onclick="salvarAporte()">Salvar Aporte</button>
</div>

<div class="card">
<h2>Rendimento Mensal</h2>
<input type="text" id="fundoRendimento" placeholder="Fundo">
<input type="month" id="mes">
<input type="number" step="0.01" id="rendimento" placeholder="Valor recebido">
<button onclick="salvarRendimento()">Salvar Rendimento</button>
</div>

<div class="card resumo">
<h3 id="totalInvestido">Investido: R$ 0,00</h3>
<h3 id="totalRendimentos">Rendimentos: R$ 0,00</h3>
</div>

<div class="card">
<h2>Fundos Cadastrados</h2>
<div id="listaFundos"></div>
</div>

<button onclick="location.href='historico.html'" class="historico-btn">📋 Abrir Histórico</button>
</div>

<script src="app.js"></script>
<script>
carregarListaFundos();
</script>
</body>
</html>
